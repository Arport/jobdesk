<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster Pro - Waktu & Tugas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background-color 0.3s, color 0.3s; 
        }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }
        
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .task-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1); }
        .dark .task-card:hover { box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.5); }

        .nav-btn.active { 
            background-color: #2563eb; 
            color: white; 
            font-weight: 700; 
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen dark:bg-slate-950 dark:text-slate-100">

    <!-- Auth Screen -->
    <div id="authScreen" class="fixed inset-0 z-[100] bg-slate-50 dark:bg-slate-950 flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-[2.5rem] p-8 lg:p-10 shadow-2xl border border-slate-200 dark:border-slate-800">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-3xl shadow-lg shadow-blue-600/30 mx-auto mb-4">T</div>
                <h2 class="text-2xl font-black">Masuk TaskMaster</h2>
                <p class="text-slate-500 text-sm mt-2">Masukkan username Anda untuk melanjutkan</p>
            </div>

            <form id="authForm" class="space-y-4">
                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest block mb-2 ml-1">Username</label>
                    <input type="text" id="authUsername" required placeholder="Ketik nama Anda..." class="w-full px-5 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-blue-500 outline-none transition-all font-bold">
                </div>
                
                <div id="authError" class="text-red-500 text-xs font-bold text-center hidden p-3 bg-red-50 dark:bg-red-900/10 rounded-xl"></div>
                
                <button type="submit" id="authSubmitBtn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl shadow-blue-600/30 hover:bg-blue-700 transition-all">
                    Masuk Sekarang
                </button>
            </form>
        </div>
    </div>

    <!-- Main App UI -->
    <div id="mainApp" class="flex min-h-screen hidden">
        <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden lg:hidden"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-72 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col">
            <div class="p-6 flex-1">
                <div class="flex items-center justify-between mb-10">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-blue-600/30">T</div>
                        <h1 class="text-xl font-black tracking-tight">TaskMaster</h1>
                    </div>
                </div>

                <nav class="space-y-2" id="categoryNav">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4 ml-4">Navigasi</p>
                    <button data-cat="All" class="nav-btn active w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        <span>Semua Tugas</span>
                    </button>
                    <button data-cat="Work" class="nav-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745V20a2 2 0 002 2h14a2 2 0 002-2v-6.745z"></path></svg>
                        <span>Pekerjaan</span>
                    </button>
                    <button data-cat="Personal" class="nav-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        <span>Personal</span>
                    </button>
                </nav>
            </div>

            <div class="p-6 border-t border-slate-200 dark:border-slate-800 space-y-4">
                <div class="p-4 rounded-2xl bg-blue-50 dark:bg-blue-900/20">
                    <p class="text-[10px] font-bold text-blue-600 uppercase mb-1">User Aktif</p>
                    <p id="usernameDisplay" class="text-sm font-black truncate">Memuat...</p>
                </div>
                <button id="themeToggle" class="w-full flex items-center gap-3 px-4 py-2 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <span class="text-sm font-semibold">Ubah Tema</span>
                </button>
                <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-2 rounded-xl text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    <span class="text-sm font-bold">Keluar</span>
                </button>
            </div>
        </aside>

        <!-- Content -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="p-4 lg:p-8 flex items-center justify-between gap-4 sticky top-0 z-30 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-md">
                <button id="openSidebar" class="lg:hidden p-2 rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>

                <div class="relative flex-1 max-w-xl hidden md:block">
                    <input type="text" id="searchInput" placeholder="Cari tugas Anda..." class="w-full pl-12 pr-4 py-3 rounded-2xl outline-none shadow-sm dark:bg-slate-900 border border-transparent focus:ring-2 focus:ring-blue-500">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

                <button id="btnNewTask" class="flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-600/30 hover:bg-blue-700 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"></path></svg>
                    <span>Tambah Tugas</span>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto px-4 lg:px-8 pb-20 custom-scroll">
                <div class="max-w-4xl mx-auto">
                    <div class="mb-10 mt-4">
                        <h2 id="currentCategoryTitle" class="text-4xl font-extrabold tracking-tight">Semua Tugas</h2>
                        <div class="flex items-center gap-3 mt-2">
                            <span id="taskCountLabel" class="text-slate-500 text-sm font-medium italic">Menyinkronkan...</span>
                        </div>
                    </div>

                    <div id="taskList" class="grid gap-4">
                        <!-- Tasks rendered here -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modalTask" class="fixed inset-0 z-[110] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-slate-950/70 backdrop-blur-md" id="modalBackdrop"></div>
        <div class="relative w-full max-w-lg bg-white dark:bg-slate-900 rounded-[2.5rem] p-8 lg:p-10 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-black">Detail Tugas</h3>
                <button id="btnCloseModal" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="taskForm" class="space-y-5">
                <input type="hidden" id="editId">
                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase block mb-2">Judul Tugas</label>
                    <input type="text" id="taskTitle" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 font-bold outline-none focus:border-blue-500 border-2 border-transparent transition-all" placeholder="Apa yang ingin dikerjakan?">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 uppercase block mb-2">Waktu & Tanggal</label>
                        <input type="datetime-local" id="taskDeadline" class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-800 font-bold outline-none border-2 border-transparent focus:border-blue-500 text-sm">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 uppercase block mb-2">Prioritas</label>
                        <select id="taskPriority" class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-800 font-bold outline-none border-2 border-transparent focus:border-blue-500">
                            <option value="Low">Rendah</option>
                            <option value="Medium" selected>Sedang</option>
                            <option value="High">Tinggi</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase block mb-2">Kategori</label>
                    <select id="taskCategory" class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-800 font-bold outline-none border-2 border-transparent focus:border-blue-500">
                        <option value="Work">Pekerjaan</option>
                        <option value="Personal">Personal</option>
                    </select>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase block mb-2">Catatan</label>
                    <textarea id="taskDesc" class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 outline-none min-h-[80px] border-2 border-transparent focus:border-blue-500" placeholder="Tambahkan deskripsi jika perlu..."></textarea>
                </div>

                <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl hover:bg-blue-700 transition-colors">Simpan Perubahan</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // Firebase Configuration Parsing
        let firebaseConfig = {};
        try {
            firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) {
            console.error("Gagal memuat konfigurasi Firebase", e);
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'task_master_pro';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allTasks = [];
        let currentFilter = 'All';
        let currentUser = null;
        let unsubscribeTasks = null;

        // UI Refs
        const authScreen = document.getElementById('authScreen');
        const mainApp = document.getElementById('mainApp');
        const taskListEl = document.getElementById('taskList');
        const usernameDisplay = document.getElementById('usernameDisplay');
        const authError = document.getElementById('authError');

        // Authentication logic
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const handle = localStorage.getItem('tm_handle');
            
            if (user && handle) {
                setupApp(handle);
                subscribeToData(user.uid);
            } else {
                showAuth();
            }
        });

        const showAuth = () => {
            authScreen.classList.remove('hidden');
            mainApp.classList.add('hidden');
        };

        const setupApp = (handle) => {
            authScreen.classList.add('hidden');
            mainApp.classList.remove('hidden');
            usernameDisplay.innerText = "@" + handle;
        };

        document.getElementById('authForm').onsubmit = async (e) => {
            e.preventDefault();
            const handle = document.getElementById('authUsername').value.trim().toLowerCase();
            
            if (handle.length < 3) {
                authError.innerText = "Username minimal 3 karakter";
                authError.classList.remove('hidden');
                return;
            }
            
            try {
                authError.classList.add('hidden');
                localStorage.setItem('tm_handle', handle);
                
                if (!auth.currentUser) {
                    await signInAnonymously(auth);
                } else {
                    setupApp(handle);
                    subscribeToData(auth.currentUser.uid);
                }
            } catch (err) {
                console.error("Login Error:", err);
                authError.innerText = "Terjadi kesalahan saat masuk. Coba lagi.";
                authError.classList.remove('hidden');
            }
        };

        const subscribeToData = (uid) => {
            if (unsubscribeTasks) unsubscribeTasks();
            
            try {
                const colRef = collection(db, 'artifacts', appId, 'users', uid, 'tasks');
                unsubscribeTasks = onSnapshot(query(colRef), (snap) => {
                    allTasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    allTasks.sort((a, b) => {
                        const timeA = a.createdAt?.seconds || 0;
                        const timeB = b.createdAt?.seconds || 0;
                        return timeB - timeA;
                    });
                    render();
                }, (err) => {
                    console.error("Firestore error:", err);
                });
            } catch (e) {
                console.error("Gagal subscribe data:", e);
            }
        };

        const formatLocaleDate = (dateStr) => {
            if (!dateStr) return null;
            const date = new Date(dateStr);
            return date.toLocaleString('id-ID', { 
                weekday: 'long', 
                day: 'numeric', 
                month: 'short', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        };

        const checkIsOverdue = (dateStr) => {
            if (!dateStr) return false;
            return new Date(dateStr) < new Date();
        };

        window.render = () => {
            const searchInput = document.getElementById('searchInput');
            const search = searchInput ? searchInput.value.toLowerCase() : "";
            
            const filtered = allTasks.filter(t => {
                const matchesCat = currentFilter === 'All' || t.category === currentFilter;
                const matchesSearch = (t.title || "").toLowerCase().includes(search);
                return matchesCat && matchesSearch;
            });

            const countEl = document.getElementById('taskCountLabel');
            if (countEl) {
                const completedCount = filtered.filter(t => t.status === 'Completed').length;
                countEl.innerText = `${completedCount} dari ${filtered.length} tugas selesai`;
            }

            if (filtered.length === 0) {
                taskListEl.innerHTML = `<div class="py-20 text-center text-slate-400 font-bold">Belum ada tugas</div>`;
                return;
            }

            taskListEl.innerHTML = filtered.map((task, idx) => {
                const isCompleted = task.status === 'Completed';
                const overdue = !isCompleted && checkIsOverdue(task.deadline);
                const pColor = task.priority === 'High' ? 'text-red-500 bg-red-100 dark:bg-red-900/20' : 
                               task.priority === 'Medium' ? 'text-orange-500 bg-orange-100 dark:bg-orange-900/20' : 
                               'text-green-500 bg-green-100 dark:bg-green-900/20';

                return `
                    <div class="task-card flex items-center gap-4 p-5 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 animate-fade-in" style="animation-delay: ${idx * 0.05}s">
                        <button onclick="updateStatus('${task.id}', '${task.status}')" class="w-6 h-6 shrink-0 rounded-full border-2 flex items-center justify-center transition-colors ${isCompleted ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300 hover:border-blue-500'}">
                            ${isCompleted ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </button>
                        <div class="flex-1 min-w-0">
                            <div class="flex gap-2 items-center mb-1">
                                <span class="text-[9px] px-2 py-0.5 rounded-full font-black uppercase ${pColor}">${task.priority}</span>
                                ${task.deadline ? `<span class="text-[9px] font-bold uppercase flex items-center gap-1 ${overdue ? 'text-red-500' : 'text-slate-400'}">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    ${formatLocaleDate(task.deadline)}
                                </span>` : ''}
                            </div>
                            <h3 class="font-bold text-sm lg:text-base truncate ${isCompleted ? 'line-through opacity-40' : ''}">${task.title}</h3>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="openEdit('${task.id}')" class="p-2 text-slate-400 hover:text-blue-500 transition-colors" title="Edit Tugas">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button onclick="removeTask('${task.id}')" class="p-2 text-slate-300 hover:text-red-500 transition-colors" title="Hapus Tugas">
                                 <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>`;
            }).join('');
        };

        window.updateStatus = async (id, status) => {
            if (!currentUser) return;
            const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', id);
            await updateDoc(ref, { status: status === 'Completed' ? 'Pending' : 'Completed', updatedAt: serverTimestamp() });
        };

        window.removeTask = async (id) => {
            if (!currentUser) return;
            const ref = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', id);
            await deleteDoc(ref);
        };

        window.openEdit = (id) => {
            const t = allTasks.find(x => x.id === id);
            if (!t) return;
            document.getElementById('editId').value = t.id;
            document.getElementById('taskTitle').value = t.title;
            document.getElementById('taskDeadline').value = t.deadline || '';
            document.getElementById('taskCategory').value = t.category;
            document.getElementById('taskPriority').value = t.priority;
            document.getElementById('taskDesc').value = t.description || '';
            document.getElementById('modalTask').classList.remove('hidden');
        };

        document.getElementById('taskForm').onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('taskTitle').value,
                deadline: document.getElementById('taskDeadline').value,
                category: document.getElementById('taskCategory').value,
                priority: document.getElementById('taskPriority').value,
                description: document.getElementById('taskDesc').value,
                updatedAt: serverTimestamp()
            };

            const col = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks');
            if (id) {
                await updateDoc(doc(col, id), data);
            } else {
                data.status = 'Pending';
                data.createdAt = serverTimestamp();
                await addDoc(col, data);
            }
            closeModal();
        };

        const closeModal = () => {
            document.getElementById('modalTask').classList.add('hidden');
            document.getElementById('taskForm').reset();
            document.getElementById('editId').value = '';
        };

        document.getElementById('btnNewTask').onclick = () => {
            closeModal();
            document.getElementById('modalTask').classList.remove('hidden');
        };
        document.getElementById('btnCloseModal').onclick = closeModal;
        document.getElementById('modalBackdrop').onclick = closeModal;
        
        document.getElementById('logoutBtn').onclick = async () => {
            localStorage.removeItem('tm_handle');
            if (unsubscribeTasks) unsubscribeTasks();
            await signOut(auth);
            window.location.reload(); // Paksa reload untuk membersihkan state
        };
        
        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');
        document.getElementById('searchInput').oninput = render;

        document.querySelectorAll('.nav-btn').forEach(b => {
            b.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                currentFilter = b.dataset.cat;
                document.getElementById('currentCategoryTitle').innerText = b.querySelector('span').innerText;
                render();
            };
        });

        document.getElementById('openSidebar').onclick = () => {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.remove('hidden');
        };
        document.getElementById('sidebarOverlay').onclick = () => {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.add('hidden');
        };
    </script>
</body>
</html>
