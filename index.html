<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master Pro - Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }
        
        /* Checkbox custom animation */
        .check-btn:active { transform: scale(0.9); }
        .task-card { transition: all 0.2s ease; }
        .task-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-300 min-h-screen" id="appBody">

    <!-- Sidebar Overlay (Mobile) -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden lg:hidden"></div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-72 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col">
            <div class="p-6 flex-1">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-lg shadow-lg shadow-blue-600/20">T</div>
                        <h1 class="text-xl font-black tracking-tight dark:text-white">TaskMaster</h1>
                    </div>
                    <button id="closeSidebar" class="lg:hidden p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <nav class="space-y-1.5" id="categoryNav">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 ml-4">Navigasi</p>
                    <button data-cat="All" class="nav-btn active w-full flex items-center gap-3 px-4 py-3 rounded-2xl bg-blue-600 text-white font-bold shadow-lg shadow-blue-600/20">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        Semua
                    </button>
                    <button data-cat="Work" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 font-medium">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745V20a2 2 0 002 2h14a2 2 0 002-2v-6.745zM3.187 9.263l8.813 4.41 8.812-4.411a2 2 0 00-2.138-3.489l-6.674 3.337-6.674-3.337a2 2 0 00-2.139 3.488z"></path></svg>
                        Kerja
                    </button>
                    <button data-cat="Personal" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 font-medium">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        Personal
                    </button>
                </nav>
            </div>

            <div class="p-6 border-t border-slate-200 dark:border-slate-800">
                <div class="mb-4 p-4 rounded-2xl bg-slate-100 dark:bg-slate-800">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Status Cloud</p>
                    <p id="cloudStatus" class="text-[10px] font-mono dark:text-slate-300 truncate">Menghubungkan...</p>
                </div>
                <button id="themeToggle" class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 font-medium">
                    <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <span>Mode Gelap</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="p-4 lg:p-8 flex items-center justify-between gap-4">
                <button id="openSidebar" class="lg:hidden p-2 rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800">
                    <svg class="w-6 h-6 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>

                <div class="relative flex-1 max-w-lg hidden sm:block">
                    <input type="text" id="searchInput" placeholder="Cari tugas..." class="w-full pl-12 pr-4 py-2.5 rounded-2xl border-none outline-none shadow-sm text-sm dark:bg-slate-900 dark:text-white">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

                <button id="btnNewTask" class="flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white rounded-xl font-bold shadow-lg shadow-blue-600/20 active:scale-95 transition-transform ml-auto">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span>Baru</span>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto px-4 lg:px-8 pb-24 lg:pb-8 custom-scroll">
                <div class="max-w-4xl mx-auto">
                    <div class="mb-8">
                        <h2 id="currentCategoryTitle" class="text-3xl font-black dark:text-white">Semua Tugas</h2>
                        <p class="text-slate-500 text-sm font-medium mt-1">Kelola produktivitas harian Anda</p>
                    </div>

                    <div id="taskList" class="grid gap-4">
                        <!-- Tasks will be rendered here -->
                        <div class="p-10 text-center text-slate-400">Memuat data...</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modalTask" class="fixed inset-0 z-[70] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative w-full max-w-lg bg-white dark:bg-slate-900 rounded-3xl p-6 lg:p-8 animate-in zoom-in duration-200">
            <h3 class="text-xl font-black mb-6 flex items-center gap-2 dark:text-white">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Tugas Baru
            </h3>
            <form id="taskForm" class="space-y-4">
                <input type="hidden" id="editId">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2 ml-1">Judul Tugas</label>
                    <input type="text" id="taskTitle" required placeholder="Apa yang ingin dikerjakan?" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-blue-500 outline-none font-bold text-lg dark:text-white">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2 ml-1">Kategori</label>
                        <select id="taskCategory" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent font-bold text-sm dark:text-white outline-none focus:border-blue-500">
                            <option value="Work">Kerja</option>
                            <option value="Personal">Personal</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2 ml-1">Prioritas</label>
                        <select id="taskPriority" class="w-full p-3 rounded-xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent font-bold text-sm dark:text-white outline-none focus:border-blue-500">
                            <option value="Low">Rendah</option>
                            <option value="Medium" selected>Sedang</option>
                            <option value="High">Tinggi</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2 ml-1">Deskripsi (Opsional)</label>
                    <textarea id="taskDesc" class="w-full p-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-blue-500 outline-none text-sm min-h-[100px] dark:text-white"></textarea>
                </div>
                <div class="flex justify-end gap-2 pt-4 border-t border-slate-100 dark:border-slate-800">
                    <button type="button" onclick="closeModal()" class="px-6 py-3 font-bold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition-colors">Batal</button>
                    <button type="submit" class="px-8 py-3 bg-blue-600 text-white rounded-2xl font-black shadow-lg shadow-blue-600/20 active:scale-95 transition-transform">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- KONFIGURASI FIREBASE ---
        // Ganti dengan Config dari Firebase Console Anda
        const firebaseConfig = {
            apiKey: "",
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = 'task-master-pro';
        
        let currentUser = null;
        let allTasks = [];
        let currentFilter = 'All';

        // --- Auth & Firestore Sync ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('cloudStatus').innerText = user.uid.substring(0, 10) + '...';
                syncTasks();
            } else {
                signInAnonymously(auth);
            }
        });

        function syncTasks() {
            const tasksPath = `artifacts/${APP_ID}/public/data/tasks`;
            const q = query(collection(db, tasksPath));

            onSnapshot(q, (snapshot) => {
                allTasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderTasks();
            }, (error) => {
                console.error("Firestore Error:", error);
            });
        }

        // --- Core Logic ---
        window.renderTasks = () => {
            const listEl = document.getElementById('taskList');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allTasks.filter(t => {
                const matchCat = currentFilter === 'All' || t.category === currentFilter;
                const matchSearch = t.title.toLowerCase().includes(searchVal);
                return matchCat && matchSearch;
            });

            if (filtered.length === 0) {
                listEl.innerHTML = `
                    <div class="p-12 text-center">
                        <div class="w-16 h-16 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0a2 2 0 01-2 2H6a2 2 0 01-2-2m16 0l-8 8-8-8"></path></svg>
                        </div>
                        <p class="text-slate-500 font-medium">Belum ada tugas di kategori ini.</p>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = filtered.map(task => `
                <div class="task-card group flex items-center gap-4 p-4 lg:p-5 bg-white dark:bg-slate-900 rounded-3xl border border-transparent shadow-sm hover:shadow-md transition-all">
                    <button onclick="toggleComplete('${task.id}', '${task.status}')" class="check-btn p-1 rounded-full transition-colors ${task.status === 'Completed' ? 'text-green-500' : 'text-slate-300 hover:text-blue-500'}">
                        ${task.status === 'Completed' 
                            ? '<svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>'
                            : '<svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'
                        }
                    </button>
                    
                    <div class="flex-1 min-w-0" onclick="editTask('${task.id}')">
                        <h3 class="font-bold text-sm lg:text-base truncate dark:text-white ${task.status === 'Completed' ? 'line-through text-slate-400' : ''}">${task.title}</h3>
                        <div class="flex items-center gap-3 mt-1.5 text-[10px] font-bold">
                            <span class="px-2 py-0.5 rounded-md ${task.category === 'Work' ? 'bg-blue-100 text-blue-600' : 'bg-orange-100 text-orange-600'}">${task.category === 'Work' ? 'Kerja' : 'Personal'}</span>
                            <span class="text-slate-400 uppercase">${task.priority} Priority</span>
                        </div>
                    </div>

                    <div class="flex items-center gap-1">
                        <button onclick="deleteTask('${task.id}')" class="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-xl transition-all lg:opacity-0 group-hover:opacity-100">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');
        };

        window.toggleComplete = async (id, currentStatus) => {
            const docRef = doc(db, `artifacts/${APP_ID}/public/data/tasks`, id);
            await updateDoc(docRef, { status: currentStatus === 'Completed' ? 'Pending' : 'Completed' });
        };

        window.deleteTask = async (id) => {
            if (!confirm('Hapus tugas ini?')) return;
            const docRef = doc(db, `artifacts/${APP_ID}/public/data/tasks`, id);
            await deleteDoc(docRef);
        };

        window.saveTask = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const data = {
                title: document.getElementById('taskTitle').value,
                category: document.getElementById('taskCategory').value,
                priority: document.getElementById('taskPriority').value,
                description: document.getElementById('taskDesc').value,
                updatedAt: new Date().toISOString()
            };

            const tasksPath = `artifacts/${APP_ID}/public/data/tasks`;
            if (id) {
                await updateDoc(doc(db, tasksPath, id), data);
            } else {
                data.status = 'Pending';
                data.createdAt = new Date().toISOString();
                await addDoc(collection(db, tasksPath), data);
            }
            closeModal();
        };

        window.editTask = (id) => {
            const task = allTasks.find(t => t.id === id);
            if (!task) return;
            document.getElementById('editId').value = task.id;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskCategory').value = task.category;
            document.getElementById('taskPriority').value = task.priority;
            document.getElementById('taskDesc').value = task.description || '';
            document.getElementById('modalTask').classList.remove('hidden');
        };

        // --- UI Interactions ---
        document.getElementById('taskForm').onsubmit = window.saveTask;

        document.getElementById('btnNewTask').onclick = () => {
            document.getElementById('taskForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('modalTask').classList.remove('hidden');
        };

        window.closeModal = () => {
            document.getElementById('modalTask').classList.add('hidden');
        };

        document.getElementById('searchInput').oninput = window.renderTasks;

        // Kategori Navigasi
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => {
                    b.classList.remove('active', 'bg-blue-600', 'text-white', 'font-bold', 'shadow-lg');
                    b.classList.add('text-slate-500', 'font-medium');
                });
                btn.classList.add('active', 'bg-blue-600', 'text-white', 'font-bold', 'shadow-lg');
                btn.classList.remove('text-slate-500', 'font-medium');
                
                currentFilter = btn.dataset.cat;
                document.getElementById('currentCategoryTitle').innerText = 
                    currentFilter === 'All' ? 'Semua Tugas' : 
                    currentFilter === 'Work' ? 'Tugas Kerja' : 'Tugas Personal';
                
                renderTasks();
                // Close sidebar mobile
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('sidebarOverlay').classList.add('hidden');
            };
        });

        // Theme Toggle
        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('themeIcon');
            const text = document.querySelector('#themeToggle span');
            
            if (isDark) {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>';
                text.innerText = 'Mode Terang';
                document.body.classList.add('bg-slate-950');
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
                text.innerText = 'Mode Gelap';
                document.body.classList.remove('bg-slate-950');
            }
        };

        // Sidebar Mobile Toggle
        document.getElementById('openSidebar').onclick = () => {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.remove('hidden');
        };
        document.getElementById('closeSidebar').onclick = document.getElementById('sidebarOverlay').onclick = () => {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.add('hidden');
        };
    </script>
</body>
</html>
