<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master Pro - Cloud Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background-color 0.3s, color 0.3s; 
        }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }
        
        .task-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .task-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1); 
        }
        .dark .task-card:hover {
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.5);
        }

        .nav-btn.active { 
            background-color: #2563eb; 
            color: white; 
            font-weight: 700; 
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen dark:bg-slate-950 dark:text-slate-100" id="appBody">

    <!-- Sidebar Overlay (Mobile) -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity"></div>

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-72 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col">
            <div class="p-6 flex-1">
                <div class="flex items-center justify-between mb-10">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-blue-600/30">T</div>
                        <h1 class="text-xl font-black tracking-tight">TaskMaster</h1>
                    </div>
                    <button id="closeSidebar" class="lg:hidden p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <nav class="space-y-2" id="categoryNav">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4 ml-4">Kategori Utama</p>
                    <button data-cat="All" class="nav-btn active w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        <span>Semua Tugas</span>
                    </button>
                    <button data-cat="Work" class="nav-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 font-semibold transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745V20a2 2 0 002 2h14a2 2 0 002-2v-6.745zM3.187 9.263l8.813 4.41 8.812-4.411a2 2 0 00-2.138-3.489l-6.674 3.337-6.674-3.337a2 2 0 00-2.139 3.488z"></path></svg>
                        <span>Pekerjaan</span>
                    </button>
                    <button data-cat="Personal" class="nav-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 font-semibold transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        <span>Personal</span>
                    </button>
                </nav>
            </div>

            <div class="p-6 border-t border-slate-200 dark:border-slate-800 space-y-4">
                <div class="p-4 rounded-2xl bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/30">
                    <p class="text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase mb-1">Status Sinkronisasi</p>
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                        <p id="cloudStatus" class="text-xs font-medium dark:text-slate-300 truncate">Menghubungkan...</p>
                    </div>
                </div>
                <button id="themeToggle" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 font-semibold transition-all">
                    <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <span>Mode Gelap</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="p-4 lg:p-8 flex items-center justify-between gap-4 bg-white/50 dark:bg-slate-950/50 backdrop-blur-md sticky top-0 z-30">
                <button id="openSidebar" class="lg:hidden p-2.5 rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>

                <div class="relative flex-1 max-w-xl hidden md:block">
                    <input type="text" id="searchInput" placeholder="Cari tugas Anda di sini..." class="w-full pl-12 pr-4 py-3 rounded-2xl border-none outline-none shadow-sm text-sm dark:bg-slate-900 dark:text-white border border-transparent focus:ring-2 focus:ring-blue-500 transition-all">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

                <button id="btnNewTask" class="flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-600/30 active:scale-95 hover:bg-blue-700 transition-all ml-auto">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span>Tugas Baru</span>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto px-4 lg:px-8 pb-24 lg:pb-8 custom-scroll">
                <div class="max-w-4xl mx-auto">
                    <div class="mb-10 mt-4">
                        <h2 id="currentCategoryTitle" class="text-4xl font-extrabold tracking-tight">Semua Tugas</h2>
                        <div class="flex items-center gap-3 mt-2">
                            <span id="taskCountLabel" class="text-slate-500 text-sm font-medium">Memuat statistik...</span>
                        </div>
                    </div>

                    <div id="taskList" class="grid gap-4">
                        <!-- Shimmer Loading -->
                        <div class="animate-pulse flex flex-col gap-4">
                            <div class="h-20 bg-slate-200 dark:bg-slate-800 rounded-3xl"></div>
                            <div class="h-20 bg-slate-200 dark:bg-slate-800 rounded-3xl"></div>
                            <div class="h-20 bg-slate-200 dark:bg-slate-800 rounded-3xl"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modalTask" class="fixed inset-0 z-[70] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-slate-950/70 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative w-full max-w-lg bg-white dark:bg-slate-900 rounded-[2.5rem] p-8 lg:p-10 shadow-2xl border border-white/20">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-black flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-100 dark:bg-blue-900/40 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </div>
                    <span>Detail Tugas</span>
                </h3>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="taskForm" class="space-y-6">
                <input type="hidden" id="editId">
                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest block mb-2.5 ml-1">Judul Utama</label>
                    <input type="text" id="taskTitle" required placeholder="Apa yang harus diselesaikan?" class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-blue-500 focus:bg-white dark:focus:bg-slate-800 outline-none font-bold text-xl transition-all">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest block mb-2.5 ml-1">Kategori</label>
                        <select id="taskCategory" class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent font-bold text-sm outline-none focus:border-blue-500 transition-all appearance-none cursor-pointer">
                            <option value="Work">Pekerjaan</option>
                            <option value="Personal">Personal</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest block mb-2.5 ml-1">Prioritas</label>
                        <select id="taskPriority" class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent font-bold text-sm outline-none focus:border-blue-500 transition-all appearance-none cursor-pointer">
                            <option value="Low">Rendah</option>
                            <option value="Medium" selected>Sedang</option>
                            <option value="High">Tinggi</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest block mb-2.5 ml-1">Deskripsi Tambahan</label>
                    <textarea id="taskDesc" placeholder="Tambahkan catatan jika perlu..." class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-blue-500 focus:bg-white dark:focus:bg-slate-800 outline-none text-sm min-h-[120px] transition-all"></textarea>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl shadow-blue-600/30 active:scale-95 hover:bg-blue-700 transition-all">Simpan Perubahan</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK & App Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, query, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Ganti dengan konfigurasi Anda jika diperlukan
        const firebaseConfig = {
            apiKey: "AIzaSyAu2oDjNJvBUn160F7bCY6NvqMfvN1wVrM",
            authDomain: "jobdesk-aac9d.firebaseapp.com",
            projectId: "jobdesk-aac9d",
            storageBucket: "jobdesk-aac9d.firebasestorage.app",
            messagingSenderId: "423551478101",
            appId: "1:423551478101:web:de21819000736d684da7dc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = 'task-master-pro-premium';

        let allTasks = [];
        let currentFilter = 'All';

        // --- Auth Initialization ---
        const initAuth = async () => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    document.getElementById('cloudStatus').innerText = `ID Sesi: ${user.uid.substring(0, 8)}`;
                    startDataSubscription(user.uid);
                } else {
                    signInAnonymously(auth).catch(e => console.error("Koneksi gagal:", e));
                }
            });
        };

        // --- Firestore Real-time Sync ---
        const startDataSubscription = (uid) => {
            // Kita gunakan collection publik untuk kemudahan demo di platform ini
            const taskCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'tasks');
            const q = query(taskCol);

            onSnapshot(q, (snapshot) => {
                allTasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                // Sort manual karena Rule 2: No Complex Queries
                allTasks.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                renderTasks();
            }, (error) => {
                console.error("Sinkronisasi Error:", error);
                document.getElementById('taskList').innerHTML = `
                    <div class="p-8 text-center bg-red-50 dark:bg-red-900/10 rounded-3xl border border-red-100 dark:border-red-900/20">
                        <p class="text-red-600 dark:text-red-400 font-bold">Gagal memuat data cloud.</p>
                        <p class="text-xs text-red-500/70 mt-1">Pastikan Firestore sudah dalam Mode Test (Read/Write: true)</p>
                    </div>
                `;
            });
        };

        // --- Rendering Logic ---
        window.renderTasks = () => {
            const listEl = document.getElementById('taskList');
            const countEl = document.getElementById('taskCountLabel');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = allTasks.filter(t => {
                const matchCat = currentFilter === 'All' || t.category === currentFilter;
                const matchSearch = (t.title || "").toLowerCase().includes(searchVal) || (t.description || "").toLowerCase().includes(searchVal);
                return matchCat && matchSearch;
            });

            // Update Statistik
            const completedCount = filtered.filter(t => t.status === 'Completed').length;
            countEl.innerText = `${completedCount} dari ${filtered.length} tugas selesai`;

            if (filtered.length === 0) {
                listEl.innerHTML = `
                    <div class="p-20 text-center animate-fade-in">
                        <div class="w-24 h-24 bg-slate-100 dark:bg-slate-800 rounded-[2rem] flex items-center justify-center mx-auto mb-6">
                            <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        </div>
                        <h3 class="text-xl font-bold text-slate-400">Belum ada tugas</h3>
                        <p class="text-slate-500 text-sm mt-1">Mulai produktivitas Anda dengan menambah tugas baru.</p>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = filtered.map((task, idx) => {
                const isCompleted = task.status === 'Completed';
                const priorityColors = {
                    'High': 'text-red-600 bg-red-100 dark:bg-red-900/30 dark:text-red-400',
                    'Medium': 'text-orange-600 bg-orange-100 dark:bg-orange-900/30 dark:text-orange-400',
                    'Low': 'text-green-600 bg-green-100 dark:bg-green-900/30 dark:text-green-400'
                };

                return `
                    <div class="task-card group flex items-center gap-5 p-5 lg:p-6 bg-white dark:bg-slate-900 rounded-[2rem] border border-slate-200 dark:border-slate-800 animate-fade-in" style="animation-delay: ${idx * 0.05}s">
                        <button onclick="toggleTaskStatus('${task.id}', '${task.status}')" class="flex-shrink-0 w-8 h-8 rounded-full border-2 transition-all flex items-center justify-center ${isCompleted ? 'bg-green-500 border-green-500 text-white shadow-lg shadow-green-500/20' : 'border-slate-300 dark:border-slate-700 text-transparent hover:border-blue-500 hover:text-blue-500'}">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </button>
                        
                        <div class="flex-1 min-w-0 cursor-pointer" onclick="editTask('${task.id}')">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[10px] px-2 py-0.5 rounded-full font-black tracking-tighter uppercase ${priorityColors[task.priority] || ''}">${task.priority}</span>
                                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">${task.category}</span>
                            </div>
                            <h3 class="font-bold text-base lg:text-lg truncate dark:text-white ${isCompleted ? 'line-through opacity-40' : ''}">${task.title}</h3>
                            ${task.description ? `<p class="text-xs text-slate-500 dark:text-slate-400 line-clamp-1 mt-0.5">${task.description}</p>` : ''}
                        </div>

                        <div class="flex items-center gap-2">
                            <button onclick="deleteTask('${task.id}')" class="p-3 text-slate-300 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-2xl transition-all md:opacity-0 group-hover:opacity-100">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        };

        // --- Actions ---
        window.toggleTaskStatus = async (id, currentStatus) => {
            const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'tasks', id);
            await updateDoc(docRef, { status: currentStatus === 'Completed' ? 'Pending' : 'Completed' });
        };

        window.deleteTask = async (id) => {
            if (!confirm('Hapus tugas ini secara permanen?')) return;
            const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'tasks', id);
            await deleteDoc(docRef);
        };

        window.saveTask = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const taskCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'tasks');
            
            const payload = {
                title: document.getElementById('taskTitle').value,
                category: document.getElementById('taskCategory').value,
                priority: document.getElementById('taskPriority').value,
                description: document.getElementById('taskDesc').value,
                updatedAt: serverTimestamp()
            };

            try {
                if (id) {
                    await updateDoc(doc(taskCol, id), payload);
                } else {
                    payload.status = 'Pending';
                    payload.createdAt = serverTimestamp();
                    await addDoc(taskCol, payload);
                }
                closeModal();
            } catch (err) {
                console.error("Save Error:", err);
            }
        };

        window.editTask = (id) => {
            const task = allTasks.find(t => t.id === id);
            if (!task) return;
            document.getElementById('editId').value = task.id;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskCategory').value = task.category;
            document.getElementById('taskPriority').value = task.priority;
            document.getElementById('taskDesc').value = task.description || '';
            document.getElementById('modalTask').classList.remove('hidden');
        };

        // --- UI Interactions ---
        document.getElementById('taskForm').onsubmit = window.saveTask;
        document.getElementById('btnNewTask').onclick = () => {
            document.getElementById('taskForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('modalTask').classList.remove('hidden');
        };
        window.closeModal = () => document.getElementById('modalTask').classList.add('hidden');
        document.getElementById('searchInput').oninput = window.renderTasks;

        // Navigasi Filter
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.nav-btn').forEach(b => {
                    b.classList.remove('active');
                    b.classList.add('text-slate-500', 'dark:text-slate-400');
                });
                btn.classList.add('active');
                btn.classList.remove('text-slate-500', 'dark:text-slate-400');
                
                currentFilter = btn.dataset.cat;
                document.getElementById('currentCategoryTitle').innerText = 
                    currentFilter === 'All' ? 'Semua Tugas' : 
                    currentFilter === 'Work' ? 'Pekerjaan' : 'Personal';
                
                renderTasks();
                // Close sidebar mobile
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('sidebarOverlay').classList.add('hidden');
            };
        });

        // Toggle Theme
        document.getElementById('themeToggle').onclick = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('themeIcon');
            const text = document.querySelector('#themeToggle span');
            
            if (isDark) {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>';
                text.innerText = 'Mode Terang';
            } else {
                icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
                text.innerText = 'Mode Gelap';
            }
        };

        // Mobile Sidebar Controls
        document.getElementById('openSidebar').onclick = () => {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.remove('hidden');
        };
        document.getElementById('closeSidebar').onclick = document.getElementById('sidebarOverlay').onclick = () => {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.add('hidden');
        };

        // Bootstrapping
        initAuth();
    </script>
</body>
</html>
