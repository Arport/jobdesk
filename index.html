<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master Pro - Login Username</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: background-color 0.3s, color 0.3s; 
        }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #334155; }
        
        .task-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .task-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1); }
        .dark .task-card:hover { box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.5); }

        .nav-btn.active { 
            background-color: #2563eb; 
            color: white; 
            font-weight: 700; 
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen dark:bg-slate-950 dark:text-slate-100" id="appBody">

    <div id="authScreen" class="fixed inset-0 z-[100] bg-slate-50 dark:bg-slate-950 flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-[2.5rem] p-8 lg:p-10 shadow-2xl border border-slate-200 dark:border-slate-800">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-3xl shadow-lg shadow-blue-600/30 mx-auto mb-4">T</div>
                <h2 id="authTitle" class="text-2xl font-black">Masuk TaskMaster</h2>
                <p id="authSubtitle" class="text-slate-500 text-sm mt-2">Gunakan email dan password Anda</p>
            </div>

            <form id="authForm" class="space-y-4">
    <div>
        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest block mb-2 ml-1">Username</label>
        <input type="text" id="authUsername" required placeholder="Masukkan username..." class="w-full px-5 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 border-2 border-transparent focus:border-blue-500 outline-none transition-all font-bold">
    </div>
    <div class="hidden"> 
        <input type="password" id="authPassword" value="dummy_password"> 
    </div>
    
    <div id="authError" class="text-red-500 text-xs font-bold text-center hidden p-3 bg-red-50 dark:bg-red-900/10 rounded-xl"></div>
    
    <button type="submit" id="authSubmitBtn" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl shadow-blue-600/30 hover:bg-blue-700 active:scale-[0.98] transition-all">
        Masuk Sekarang
    </button>
</form>
        </div>
    </div>

    <!-- Main App UI -->
    <div id="mainApp" class="flex min-h-screen hidden">
        <!-- Sidebar Overlay (Mobile) -->
        <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 hidden lg:hidden transition-opacity"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-72 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col">
            <div class="p-6 flex-1">
                <div class="flex items-center justify-between mb-10">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-blue-600/30">T</div>
                        <h1 class="text-xl font-black tracking-tight">TaskMaster</h1>
                    </div>
                    <button id="closeSidebar" class="lg:hidden p-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <nav class="space-y-2" id="categoryNav">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-4 ml-4">Kategori Utama</p>
                    <button data-cat="All" class="nav-btn active w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                        <span>Semua Tugas</span>
                    </button>
                    <button data-cat="Work" class="nav-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 font-semibold transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745V20a2 2 0 002 2h14a2 2 0 002-2v-6.745zM3.187 9.263l8.813 4.41 8.812-4.411a2 2 0 00-2.138-3.489l-6.674 3.337-6.674-3.337a2 2 0 00-2.139 3.488z"></path></svg>
                        <span>Pekerjaan</span>
                    </button>
                    <button data-cat="Personal" class="nav-btn w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 font-semibold transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        <span>Personal</span>
                    </button>
                </nav>
            </div>

            <div class="p-6 border-t border-slate-200 dark:border-slate-800 space-y-4">
                <div class="p-4 rounded-2xl bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/30">
                    <p class="text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase mb-1">Username</p>
                    <p id="usernameDisplay" class="text-sm font-black dark:text-slate-300 truncate">Memuat...</p>
                </div>
                <button id="themeToggle" class="w-full flex items-center gap-3 px-4 py-2 rounded-xl text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <svg id="themeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    <span class="text-sm font-semibold">Ganti Tema</span>
                </button>
                <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-2 rounded-xl text-red-500 hover:bg-red-50 dark:hover:bg-red-900/10 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    <span class="text-sm font-bold">Keluar</span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <header class="p-4 lg:p-8 flex items-center justify-between gap-4 bg-white/50 dark:bg-slate-950/50 backdrop-blur-md sticky top-0 z-30">
                <button id="openSidebar" class="lg:hidden p-2.5 rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>

                <div class="relative flex-1 max-w-xl hidden md:block">
                    <input type="text" id="searchInput" placeholder="Cari tugas..." class="w-full pl-12 pr-4 py-3 rounded-2xl border-none outline-none shadow-sm text-sm dark:bg-slate-900 dark:text-white border border-transparent focus:ring-2 focus:ring-blue-500 transition-all">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

                <button id="btnNewTask" class="flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-2xl font-bold shadow-lg shadow-blue-600/30 active:scale-95 hover:bg-blue-700 transition-all ml-auto">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    <span>Tugas Baru</span>
                </button>
            </header>

            <main class="flex-1 overflow-y-auto px-4 lg:px-8 pb-24 lg:pb-8 custom-scroll">
                <div class="max-w-4xl mx-auto">
                    <div class="mb-10 mt-4">
                        <h2 id="currentCategoryTitle" class="text-4xl font-extrabold tracking-tight">Semua Tugas</h2>
                        <div class="flex items-center gap-3 mt-2">
                            <span id="taskCountLabel" class="text-slate-500 text-sm font-medium">Memperbarui...</span>
                        </div>
                    </div>

                    <div id="taskList" class="grid gap-4">
                        <div class="animate-pulse flex flex-col gap-4">
                            <div class="h-20 bg-slate-200 dark:bg-slate-800 rounded-3xl"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Form -->
    <div id="modalTask" class="fixed inset-0 z-[110] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-slate-950/70 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative w-full max-w-lg bg-white dark:bg-slate-900 rounded-[2.5rem] p-8 lg:p-10 shadow-2xl">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-black flex items-center gap-3">Detail Tugas</h3>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="taskForm" class="space-y-6">
                <input type="hidden" id="editId">
                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase block mb-2">Judul</label>
                    <input type="text" id="taskTitle" required class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 font-bold outline-none focus:border-blue-500 border-2 border-transparent transition-all">
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 uppercase block mb-2">Kategori</label>
                        <select id="taskCategory" class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-800 font-bold outline-none">
                            <option value="Work">Pekerjaan</option>
                            <option value="Personal">Personal</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-400 uppercase block mb-2">Prioritas</label>
                        <select id="taskPriority" class="w-full px-4 py-3.5 rounded-2xl bg-slate-50 dark:bg-slate-800 font-bold outline-none">
                            <option value="Low">Rendah</option>
                            <option value="Medium" selected>Sedang</option>
                            <option value="High">Tinggi</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[11px] font-bold text-slate-400 uppercase block mb-2">Deskripsi</label>
                    <textarea id="taskDesc" class="w-full px-6 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800 outline-none min-h-[100px]"></textarea>
                </div>

                <button type="submit" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black shadow-xl">Simpan</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK & Logic -->
    <script type="module">
    // Import SDK terbaru
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { 
    getAuth, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword, 
    onAuthStateChanged, 
    signOut 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { 
    getFirestore, 
    collection, 
    addDoc, 
    updateDoc, 
    deleteDoc, 
    doc, 
    onSnapshot, 
    query, 
    serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDu_F4ue04mfJSQePdnHAU7AXloqwmhSbE",
        authDomain: "jobde-bfdd8.firebaseapp.com",
        projectId: "jobde-bfdd8",
        storageBucket: "jobde-bfdd8.firebasestorage.app",
        messagingSenderId: "509145691108",
        appId: "1:509145691108:web:6a403f9d0792b9ff060df1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const APP_ID = "task_master_pro"; 

    let allTasks = [];
    let currentFilter = 'All';
    let currentUser = null;

    // --- LOGIC LOGIN (USER TETAP INPUT USERNAME) ---
    const authForm = document.getElementById('authForm');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const authError = document.getElementById('authError');

    authForm.onsubmit = async (e) => {
        e.preventDefault();
        const username = document.getElementById('authUsername').value.trim().toLowerCase();
        
        if (username.length < 3) {
            showError("Username minimal 3 karakter");
            return;
        }

        // Trik: Ubah username jadi format email internal & password statis
        const virtualEmail = `${username}@yo.com`;
        const virtualPassword = `pass_${username}`; 

        authError.classList.add('hidden');
        authSubmitBtn.disabled = true;
        authSubmitBtn.innerText = 'Menghubungkan...';

        try {
            try {
                // Coba Login
                await signInWithEmailAndPassword(auth, virtualEmail, virtualPassword);
            } catch (err) {
                // Jika user belum ada, otomatis Register
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
                    await createUserWithEmailAndPassword(auth, virtualEmail, virtualPassword);
                } else {
                    throw err;
                }
            }
            localStorage.setItem('taskmaster_username', username);
        } catch (err) {
            showError("Gagal masuk: " + err.message);
            authSubmitBtn.disabled = false;
            authSubmitBtn.innerText = 'Masuk Sekarang';
        }
    };

    function showError(msg) {
        authError.innerText = msg;
        authError.classList.remove('hidden');
    }

    document.getElementById('logoutBtn').onclick = () => {
        localStorage.removeItem('taskmaster_username');
        signOut(auth);
    };

    // --- AUTH OBSERVER ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const savedUsername = localStorage.getItem('taskmaster_username') || user.email.split('@')[0];
            
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('usernameDisplay').innerText = "@" + savedUsername;
            
            startDataSubscription(user.uid);
        } else {
            currentUser = null;
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
            authSubmitBtn.disabled = false;
            authSubmitBtn.innerText = 'Masuk Sekarang';
        }
    });

    // --- FIRESTORE DATA ---
    let unsubscribeTasks = null;
    const startDataSubscription = (uid) => {
        if (unsubscribeTasks) unsubscribeTasks();
        const taskCol = collection(db, 'artifacts', APP_ID, 'users', uid, 'tasks');
        
        unsubscribeTasks = onSnapshot(query(taskCol), (snapshot) => {
            allTasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            allTasks.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            renderTasks();
        }, (err) => console.error(err));
    };

    // Fungsi Render, CRUD, UI Sidebar, dsb tetap sama dengan kode awal Anda
    window.renderTasks = () => {
        const listEl = document.getElementById('taskList');
        const countEl = document.getElementById('taskCountLabel');
        const searchVal = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = allTasks.filter(t => {
            const matchCat = currentFilter === 'All' || t.category === currentFilter;
            const matchSearch = (t.title || "").toLowerCase().includes(searchVal);
            return matchCat && matchSearch;
        });

        countEl.innerText = `${filtered.filter(t => t.status === 'Completed').length} dari ${filtered.length} tugas selesai`;

        if (filtered.length === 0) {
            listEl.innerHTML = `<div class="p-20 text-center text-slate-400 font-bold">Belum ada tugas</div>`;
            return;
        }

        listEl.innerHTML = filtered.map((task, idx) => {
            const isCompleted = task.status === 'Completed';
            const pColor = task.priority === 'High' ? 'text-red-500 bg-red-100 dark:bg-red-900/20' : task.priority === 'Medium' ? 'text-orange-500 bg-orange-100 dark:bg-orange-900/20' : 'text-green-500 bg-green-100 dark:bg-green-900/20';

            return `
                <div class="task-card flex items-center gap-4 p-5 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-800 animate-fade-in" style="animation-delay: ${idx * 0.05}s">
                    <button onclick="toggleStatus('${task.id}', '${task.status}')" class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${isCompleted ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300 text-transparent'}">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </button>
                    <div class="flex-1 cursor-pointer" onclick="editTask('${task.id}')">
                        <div class="flex gap-2 items-center mb-1">
                            <span class="text-[9px] px-2 py-0.5 rounded-full font-black uppercase ${pColor}">${task.priority}</span>
                            <span class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">${task.category}</span>
                        </div>
                        <h3 class="font-bold text-sm lg:text-base ${isCompleted ? 'line-through opacity-40' : ''}">${task.title}</h3>
                    </div>
                    <button onclick="deleteTask('${task.id}')" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                </div>
            `;
        }).join('');
    };

    window.toggleStatus = async (id, status) => {
        if (!currentUser) return;
        const docRef = doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'tasks', id);
        await updateDoc(docRef, { status: status === 'Completed' ? 'Pending' : 'Completed' });
    };

    window.deleteTask = async (id) => {
        if (!currentUser || !confirm('Hapus tugas ini?')) return;
        const docRef = doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'tasks', id);
        await deleteDoc(docRef);
    };

    window.editTask = (id) => {
        const task = allTasks.find(t => t.id === id);
        if (!task) return;
        document.getElementById('editId').value = task.id;
        document.getElementById('taskTitle').value = task.title;
        document.getElementById('taskCategory').value = task.category;
        document.getElementById('taskPriority').value = task.priority;
        document.getElementById('taskDesc').value = task.description || '';
        document.getElementById('modalTask').classList.remove('hidden');
    };

    window.closeModal = () => document.getElementById('modalTask').classList.add('hidden');

    document.getElementById('taskForm').onsubmit = async (e) => {
        e.preventDefault();
        if (!currentUser) return;
        const id = document.getElementById('editId').value;
        const taskCol = collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'tasks');
        const payload = {
            title: document.getElementById('taskTitle').value,
            category: document.getElementById('taskCategory').value,
            priority: document.getElementById('taskPriority').value,
            description: document.getElementById('taskDesc').value,
            updatedAt: serverTimestamp()
        };
        if (id) {
            await updateDoc(doc(taskCol, id), payload);
        } else {
            payload.status = 'Pending';
            payload.createdAt = serverTimestamp();
            await addDoc(taskCol, payload);
        }
        closeModal();
    };

    document.getElementById('btnNewTask').onclick = () => {
        document.getElementById('taskForm').reset();
        document.getElementById('editId').value = '';
        document.getElementById('modalTask').classList.remove('hidden');
    };
    document.getElementById('searchInput').oninput = renderTasks;
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.cat;
            document.getElementById('currentCategoryTitle').innerText = btn.querySelector('span').innerText;
            renderTasks();
        };
    });
    document.getElementById('themeToggle').onclick = () => {
        document.documentElement.classList.toggle('dark');
    };
    document.getElementById('openSidebar').onclick = () => {
        document.getElementById('sidebar').classList.remove('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.remove('hidden');
    };
    document.getElementById('closeSidebar').onclick = document.getElementById('sidebarOverlay').onclick = () => {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('sidebarOverlay').classList.add('hidden');
    };
</script>
</body>
</html>
